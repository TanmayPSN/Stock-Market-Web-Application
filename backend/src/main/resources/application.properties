# ?????????????????????????????????????????????
# APPLICATION
# ?????????????????????????????????????????????
spring.application.name=stock-exchange

# ?????????????????????????????????????????????
# PostgreSQL DATABASE
# ?????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/stock_exchange_db
# Local PostgreSQL. Create this database first:
# psql -U postgres -c "CREATE DATABASE stock_exchange_db;"

spring.datasource.username=postgres
# Replace with your PostgreSQL username

spring.datasource.password=2003
# Replace with your PostgreSQL password

spring.datasource.driver-class-name=org.postgresql.Driver

# ?????????????????????????????????????????????
# JPA / HIBERNATE
# ?????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
# update  ? Hibernate creates tables on first run, then only adds
#           new columns/tables if entities change. Existing data is safe.
# create  ? Drops and recreates all tables on every restart. Use only in early dev.
# validate ? Only checks schema matches entities, never modifies DB. Use in production.

spring.jpa.show-sql=true
# Prints every SQL query to console.
# Useful during development to verify queries are correct.
# Set to false in production ? too noisy.

spring.jpa.properties.hibernate.format_sql=true
# Pretty prints the SQL with indentation so it is readable in console.

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Tells Hibernate to generate PostgreSQL-specific SQL syntax.
# Without this it may generate generic SQL that misses PostgreSQL features.

# ?????????????????????????????????????????????
# JWT
# ?????????????????????????????????????????????
jwt.secret=kTBBuNXyFNNMEf3p5CJMsGBWcO+wFvZdY8e6QL1n3Yk=
# Secret key used to sign and verify JWT tokens.
# Must be at least 256 bits (32 characters) for HMAC-SHA256.
# In production, store this in environment variables ? never hardcode.

logging.level.com.stockexchange=DEBUG
logging.level.org.springframework.security=DEBUG

jwt.expiration=86400000
# Token validity in milliseconds.
# 86400000 ms = 24 hours.
# After this, the token expires and the user must log in again.

# ?????????????????????????????????????????????
# MARKET HOURS (used by MarketHoursService)
# ?????????????????????????????????????????????
market.open.time=09:15
# Market opens at 9:15 AM IST.
# MarketHoursService reads this to decide if orders can be placed.

market.close.time=17:30
# Market closes at 3:30 PM IST.
# All pending limit orders are cancelled at this time.

market.timezone=Asia/Kolkata
# All market hour calculations done in IST.
# Ensures correct behaviour regardless of where the server is hosted.

# ?????????????????????????????????????????????
# STOCK PRICE SIMULATOR
# ?????????????????????????????????????????????
simulator.update.interval=5000
# How often stock prices update in milliseconds.
# 5000 ms = every 5 seconds.
# StockPriceSimulator @Scheduled method reads this value.

simulator.max.change.percent=2.0
# Maximum % a stock price can change in one update.
# 2.0 means price can go up or down by at most 2% each tick.
# Keeps price movements realistic ? no sudden 50% jumps.

# ?????????????????????????????????????????????
# MARGIN TRADING
# ?????????????????????????????????????????????
margin.default.multiplier=5
# Default leverage given to all users.
# 5 means a user with 10,000 balance gets 50,000 trading power.

margin.call.threshold=0.8
# Margin call triggers when 80% of margin is consumed by losses.
# Example: marginLimit = 40,000 ? margin call at 32,000 loss.

# ?????????????????????????????????????????????
# SERVER
# ?????????????????????????????????????????????
server.port=8080
# Backend runs on port 8080.
# Frontend React app will call http://localhost:8080/api/...

# ?????????????????????????????????????????????
# CORS (handled in SecurityConfig but documented here)
# ?????????????????????????????????????????????
frontend.url=http://localhost:5173
# Vite dev server runs on 5173 by default.
# SecurityConfig reads this to allow cross-origin requests from React.